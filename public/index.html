<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Internal Trello - Kanban Board cho mạng nội bộ">
  <title>Internal Trello - Kanban Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- ============================================================ -->
  <!-- AUTH SCREEN: Login / Register -->
  <!-- ============================================================ -->
  <div id="auth-screen" class="screen active">
    <div class="auth-bg">
      <div class="auth-bg-shape shape-1"></div>
      <div class="auth-bg-shape shape-2"></div>
      <div class="auth-bg-shape shape-3"></div>
    </div>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="9" rx="1.5"/>
              <rect x="14" y="3" width="7" height="5" rx="1.5"/>
              <rect x="3" y="15" width="7" height="6" rx="1.5"/>
              <rect x="14" y="11" width="7" height="10" rx="1.5"/>
            </svg>
          </div>
          <h1>Internal Trello</h1>
          <p class="auth-subtitle">Kanban Board cho đội nhóm nội bộ</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
          <div class="form-group">
            <label for="login-username">Tên đăng nhập</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="login-username" placeholder="Nhập username" autocomplete="username" required>
            </div>
          </div>
          <div class="form-group">
            <label for="login-password">Mật khẩu</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="login-password" placeholder="Nhập password" autocomplete="current-password" required>
            </div>
          </div>
          <div id="login-error" class="form-error"></div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            <span>Đăng nhập</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
          <p class="auth-switch">
            Chưa có tài khoản? <a href="#" id="show-register">Đăng ký ngay</a>
          </p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form">
          <div class="form-group">
            <label for="reg-display">Tên hiển thị</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="reg-display" placeholder="VD: Nguyễn Văn A" required>
            </div>
          </div>
          <div class="form-group">
            <label for="reg-username">Tên đăng nhập</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/>
              </svg>
              <input type="text" id="reg-username" placeholder="username (ít nhất 3 ký tự)" required minlength="3">
            </div>
          </div>
          <div class="form-group">
            <label for="reg-password">Mật khẩu</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="reg-password" placeholder="password (ít nhất 4 ký tự)" required minlength="4">
            </div>
          </div>
          <div id="register-error" class="form-error"></div>
          <button type="submit" class="btn btn-primary btn-full" id="register-btn">
            <span>Đăng ký</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/>
              <line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
            </svg>
          </button>
          <p class="auth-switch">
            Đã có tài khoản? <a href="#" id="show-login">Đăng nhập</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- MAIN APP -->
  <!-- ============================================================ -->
  <div id="app-screen" class="screen">
    <!-- Top Navigation -->
    <nav id="top-nav" class="top-nav">
      <div class="nav-left">
        <button class="nav-logo" id="nav-home-btn" title="Về trang chủ">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="9" rx="1.5"/>
            <rect x="14" y="3" width="7" height="5" rx="1.5"/>
            <rect x="3" y="15" width="7" height="6" rx="1.5"/>
            <rect x="14" y="11" width="7" height="10" rx="1.5"/>
          </svg>
          <span>Internal Trello</span>
        </button>
      </div>
      <div class="nav-center" id="board-title-area"></div>
      <div class="nav-right">
        <button class="nav-btn" id="members-btn" title="Thành viên Board" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span class="nav-btn-label">Thành viên</span>
        </button>
        <button class="nav-btn" id="labels-btn" title="Quản lý Nhãn" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          <span class="nav-btn-label">Nhãn</span>
        </button>
        <button class="nav-btn" id="admin-btn" title="Admin Panel" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <div class="user-menu" id="user-menu">
          <div class="user-avatar" id="user-avatar"></div>
          <span class="user-name" id="user-name"></span>
          <div class="user-dropdown" id="user-dropdown">
            <button class="dropdown-item" id="logout-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Đăng xuất
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Board List View -->
    <div id="boards-view" class="view active">
      <div class="boards-header">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="9" rx="1.5"/>
            <rect x="14" y="3" width="7" height="5" rx="1.5"/>
            <rect x="3" y="15" width="7" height="6" rx="1.5"/>
            <rect x="14" y="11" width="7" height="10" rx="1.5"/>
          </svg>
          Boards của bạn
        </h2>
      </div>
      <div class="boards-grid" id="boards-grid">
        <!-- Boards will be rendered here -->
      </div>
    </div>

    <!-- Kanban Board View -->
    <div id="kanban-view" class="view">
      
      <!-- Filter Bar -->
      <div class="kanban-filter-bar" id="kanban-filter-bar">
        <div class="filter-group filter-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="filter-keyword" placeholder="Tìm kiếm từ khóa...">
        </div>
        <div class="filter-group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          <select id="filter-label">
            <option value="">Tất cả nhãn</option>
          </select>
        </div>
        <div class="filter-group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <select id="filter-assignee">
            <option value="">Tất cả thành viên</option>
          </select>
        </div>
        <button class="btn btn-ghost btn-sm" id="clear-filters-btn" style="display:none; padding:4px 10px;">
          Xóa bộ lọc
        </button>
      </div>

      <div class="kanban-container" id="kanban-container">
        <!-- Columns will be rendered here -->
      </div>
    </div>

    <!-- Admin Panel View -->
    <div id="admin-view" class="view">
      <div class="admin-container">
        <div class="admin-header">
          <h2>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            Quản lý Users
          </h2>
          <button class="btn btn-primary" id="admin-create-user-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/>
              <line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
            </svg>
            Tạo User
          </button>
        </div>
        <div class="admin-users-table" id="admin-users-table">
          <!-- User list will be rendered here -->
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- MODALS -->
  <!-- ============================================================ -->

  <!-- Create/Edit Board Modal -->
  <div class="modal-overlay" id="board-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="board-modal-title">Tạo Board Mới</h3>
        <button class="modal-close" data-close="board-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Tên Board</label>
          <input type="text" id="board-name-input" placeholder="VD: Dự án Website ABC" class="modal-input">
        </div>
        <div class="form-group">
          <label>Mô tả</label>
          <textarea id="board-desc-input" placeholder="Mô tả ngắn về board..." class="modal-input" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Màu nền</label>
          <div class="bg-picker" id="bg-picker">
            <div class="bg-option active" data-bg="linear-gradient(135deg, #667eea 0%, #764ba2 100%)" style="background:linear-gradient(135deg, #667eea 0%, #764ba2 100%)"></div>
            <div class="bg-option" data-bg="linear-gradient(135deg, #f093fb 0%, #f5576c 100%)" style="background:linear-gradient(135deg, #f093fb 0%, #f5576c 100%)"></div>
            <div class="bg-option" data-bg="linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)" style="background:linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)"></div>
            <div class="bg-option" data-bg="linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)" style="background:linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)"></div>
            <div class="bg-option" data-bg="linear-gradient(135deg, #fa709a 0%, #fee140 100%)" style="background:linear-gradient(135deg, #fa709a 0%, #fee140 100%)"></div>
            <div class="bg-option" data-bg="linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)" style="background:linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)"></div>
            <div class="bg-option" data-bg="linear-gradient(135deg, #fccb90 0%, #d57eeb 100%)" style="background:linear-gradient(135deg, #fccb90 0%, #d57eeb 100%)"></div>
            <div class="bg-option" data-bg="linear-gradient(135deg, #0c3483 0%, #a2b6df 100%)" style="background:linear-gradient(135deg, #0c3483 0%, #a2b6df 100%)"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close="board-modal">Hủy</button>
        <button class="btn btn-primary" id="board-save-btn">Tạo Board</button>
      </div>
    </div>
  </div>

  <!-- Card Detail Modal -->
  <div class="modal-overlay" id="card-modal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3 id="card-modal-title">Chi tiết Card</h3>
        <button class="modal-close" data-close="card-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Tiêu đề</label>
          <input type="text" id="card-title-input" class="modal-input" placeholder="Tiêu đề card">
        </div>
        <div class="form-group">
          <label>Mô tả</label>
          <textarea id="card-desc-input" class="modal-input" rows="4" placeholder="Mô tả chi tiết..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Độ ưu tiên</label>
            <select id="card-priority-input" class="modal-input">
              <option value="low">🟢 Thấp</option>
              <option value="medium" selected>🟡 Trung bình</option>
              <option value="high">🟠 Cao</option>
              <option value="urgent">🔴 Khẩn cấp</option>
            </select>
          </div>
          <div class="form-group">
            <label>Hạn chót</label>
            <input type="date" id="card-due-input" class="modal-input">
          </div>
        </div>
        <!-- Assignee Section -->
        <div class="form-group">
          <label>👤 Người phụ trách</label>
          <select id="card-assignee-input" class="modal-input">
            <option value="">-- Chưa phân công --</option>
          </select>
        </div>
        <!-- Labels Section -->
        <div class="form-group">
          <label>🏷️ Nhãn</label>
          <div id="card-labels-picker" class="card-labels-picker">
            <!-- Label options rendered by JS -->
          </div>
        </div>
        <!-- Comments Section -->
        <div class="card-comments-section">
          <h4>💬 Bình luận</h4>
          <div id="card-comments-list" class="comments-list"></div>
          <div class="comment-input-area">
            <textarea id="card-comment-input" class="modal-input" rows="2" placeholder="Viết bình luận..."></textarea>
            <button class="btn btn-primary btn-sm" id="card-comment-btn">Gửi</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="card-delete-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          Xóa
        </button>
        <button class="btn btn-ghost" data-close="card-modal">Hủy</button>
        <button class="btn btn-primary" id="card-save-btn">Lưu</button>
      </div>
    </div>
  </div>

  <!-- Admin Create User Modal -->
  <div class="modal-overlay" id="admin-user-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Tạo User Mới</h3>
        <button class="modal-close" data-close="admin-user-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Tên hiển thị</label>
          <input type="text" id="admin-user-display" class="modal-input" placeholder="VD: Nguyễn Văn A">
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="admin-user-username" class="modal-input" placeholder="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="text" id="admin-user-password" class="modal-input" placeholder="password">
        </div>
        <div class="form-group">
          <label>Quyền</label>
          <select id="admin-user-role" class="modal-input">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close="admin-user-modal">Hủy</button>
        <button class="btn btn-primary" id="admin-user-save-btn">Tạo</button>
      </div>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div class="modal-overlay" id="reset-pw-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Reset Password</h3>
        <button class="modal-close" data-close="reset-pw-modal">&times;</button>
      </div>
      <div class="modal-body">
        <p id="reset-pw-user-info" style="margin-bottom:16px;color:var(--text-secondary)"></p>
        <div class="form-group">
          <label>Password mới</label>
          <input type="text" id="reset-pw-input" class="modal-input" placeholder="Nhập password mới (ít nhất 4 ký tự)">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close="reset-pw-modal">Hủy</button>
        <button class="btn btn-primary" id="reset-pw-save-btn">Reset</button>
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Members Modal -->
  <div class="modal-overlay" id="members-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>👥 Thành viên Board</h3>
        <button class="modal-close" data-close="members-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div id="members-list" class="members-list">
          <!-- Members rendered by JS -->
        </div>
        <div class="invite-section">
          <h4 style="margin-bottom:12px;color:var(--text-secondary);font-size:0.85rem;text-transform:uppercase;letter-spacing:0.05em">Mời thành viên mới</h4>
          <div class="invite-row">
            <select id="invite-user-select" class="modal-input">
              <option value="">-- Chọn người dùng --</option>
            </select>
            <button class="btn btn-primary" id="invite-user-btn">Mời</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close="members-modal">Đóng</button>
      </div>
    </div>
  </div>

  <!-- Labels Modal -->
  <div class="modal-overlay" id="labels-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>🏷️ Quản lý Nhãn</h3>
        <button class="modal-close" data-close="labels-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div id="labels-list" class="labels-list">
          <!-- Labels rendered by JS -->
        </div>
        <div class="create-label-section">
